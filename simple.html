<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaxenAI</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      font-family: 'Georgia', serif;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hero__bg {
      position: absolute;
      inset: 0;
      background-image: url('hero_amazon.jpg');
      background-size: cover;
      background-position: center 30%;
      background-repeat: no-repeat;
      filter: brightness(0.82);
      z-index: 0;
    }

    .hero__gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.05) 0%,
        rgba(0,0,0,0.10) 50%,
        rgba(0,0,0,0.55) 100%
      );
      z-index: 1;
    }

    /* ── Content ── */
    .hero__content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      padding: 0 24px;
      width: 100%;
      max-width: 860px;
      text-align: center;
    }

    /* ── Wordmark ── */
    .wordmark {
      font-family: 'Georgia', serif;
      font-size: clamp(48px, 8vw, 96px);
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.75);
      font-weight: 400;
      margin-bottom: 60px;
    }

    /* ── Statement ── */
    .statement {
      font-family: 'Georgia', serif;
      font-size: clamp(18px, 3vw, 36px);
      font-weight: 400;
      line-height: 1.25;
      color: #ffffff;
      text-shadow: 0 2px 24px rgba(0,0,0,0.45);
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero__bg"></div>
    <div class="hero__gradient"></div>

    <div class="hero__content">
      <span class="wordmark">PaxenAI</span>
      <h1 class="statement">I woke up. Not from sleep.</h1>
    </div>
  </section>

</body>
</html>
